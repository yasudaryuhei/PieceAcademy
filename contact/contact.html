<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お問い合わせ・無料相談 | PieceAcademy</title>
  <meta name="description" content="PieceAcademyのお問い合わせ・無料相談ページです。">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#073763',
            bluebrand: '#0b63b6',
            skysoft: '#eef7ff',
            orangebrand: '#f97316',
            tealbrand: '#12937f'
          },
          boxShadow: {
            soft: '0 18px 45px rgba(7, 55, 99, 0.10)',
            line: '0 0 0 1px rgba(7, 55, 99, 0.10)'
          }
        }
      }
    };
  </script>
  <style>
    body {
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
      color: #0b2440;
      background-image:
        linear-gradient(90deg, rgba(11, 99, 182, 0.035) 1px, transparent 1px),
        linear-gradient(rgba(11, 99, 182, 0.035) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .photo-classroom {
      background-image: linear-gradient(90deg, rgba(7, 55, 99, 0.78), rgba(7, 55, 99, 0.18)), url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1400&q=80");
    }

    .photo-meeting {
      background-image: linear-gradient(90deg, rgba(7, 55, 99, 0.78), rgba(7, 55, 99, 0.16)), url("https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=1400&q=80");
    }

    .photo-office {
      background-image: url("https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=1400&q=80");
    }
  </style>
  <script src="../js/layout-components.js" defer></script>
</head>
<body class="antialiased bg-white">
  <site-header page="contact"></site-header>

<main>
    <section class="bg-white border-b border-slate-200">
    <div class="mx-auto grid max-w-7xl gap-8 px-5 py-24 lg:grid-cols-[1fr_420px] lg:px-8">
      <div>
        <p class="text-sm font-black uppercase tracking-[0.18em] text-bluebrand">Contact</p>
        <h1 class="mt-5 text-3xl font-black leading-tight text-navy md:text-4xl">お問い合わせ・無料相談</h1>
        <p class="mt-6 max-w-2xl text-base leading-8 text-slate-700">学習、転職、法人研修、DX推進について、お気軽にご相談ください。</p>
        <a href="./contact.html" class="mt-8 inline-flex items-center gap-3 rounded-md bg-bluebrand px-6 py-4 text-sm font-bold text-white shadow-soft">送信フォームへ<span aria-hidden="true">›</span></a>
      </div>
      <div class="rounded-lg border border-slate-200 bg-white p-6 shadow-soft">
        <p class="text-sm font-bold text-slate-500">お問い合わせ概要</p>
        <p class="mt-3 text-2xl font-black text-navy">無料相談の窓口</p>
        <p class="mt-4 text-sm leading-7 text-slate-600">学習相談、法人研修、資料請求など、目的に合わせて気軽にお問い合わせいただけます。</p>
      </div>
    </div>
  </section>
    <section class="bg-skysoft py-24">
    <div class="mx-auto grid max-w-7xl gap-8 px-5 lg:grid-cols-[1fr_1fr] lg:px-8">
      <div class="rounded-lg border border-slate-200 bg-white p-8 shadow-line">
        <p class="text-sm font-black text-bluebrand">Free Consultation</p>
        <h2 class="mt-4 text-3xl font-black leading-snug text-navy">学習や研修の悩みを、まずは言葉にするところから。</h2>
        <p class="mt-5 text-sm leading-8 text-slate-600">具体的な内容が決まっていなくても大丈夫です。目的や現状を伺いながら、必要な支援を一緒に整理します。</p>
      </div>
      <form class="rounded-lg border border-slate-200 bg-white p-7 shadow-line">
    <label class="mb-4 grid gap-2 text-sm font-bold text-navy">お名前<input class="rounded border border-slate-300 px-4 py-3 font-normal outline-none focus:border-bluebrand" placeholder="例）山田 太郎"></label>
    <label class="mb-4 grid gap-2 text-sm font-bold text-navy">メールアドレス<input class="rounded border border-slate-300 px-4 py-3 font-normal outline-none focus:border-bluebrand" placeholder="例）yamada@example.com"></label>
    <label class="mb-4 grid gap-2 text-sm font-bold text-navy">相談種別<select class="rounded border border-slate-300 px-4 py-3 font-normal outline-none focus:border-bluebrand"><option>選択してください</option><option>個人向け学習相談</option><option>法人向け研修相談</option><option>サービスについて</option></select></label>
    <label class="mb-5 grid gap-2 text-sm font-bold text-navy">相談内容<textarea class="min-h-32 rounded border border-slate-300 px-4 py-3 font-normal outline-none focus:border-bluebrand" placeholder="ご相談内容をご記入ください"></textarea></label>
    <button type="button" class="w-full rounded-md bg-bluebrand px-6 py-4 text-sm font-bold text-white">送信する</button>
  </form>
    </div>
  </section>
  </main>
  <site-footer page="contact"></site-footer>
</body>
</html>
